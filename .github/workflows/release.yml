name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main

  package:
    name: Package release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Normalize UF2 filenames
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          find artifacts -type f -name "*.uf2" -print

          left_file="$(find artifacts -type f -name "*.uf2" | grep -m1 "lily58_left")"
          right_file="$(find artifacts -type f -name "*.uf2" | grep -m1 "lily58_right")"
          reset_file="$(find artifacts -type f -name "*.uf2" | grep -m1 "settings_reset")"

          cp "$left_file" dist/lily58_left.uf2
          cp "$right_file" dist/lily58_right.uf2
          cp "$reset_file" dist/settings_reset.uf2

      - name: Create firmware archive + checksums
        shell: bash
        run: |
          set -euo pipefail

          (cd dist && zip -r firmware.zip lily58_left.uf2 lily58_right.uf2 settings_reset.uf2)
          (cd dist && sha256sum firmware.zip > SHA256SUMS)

      - name: Upload packaged release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/firmware.zip
            dist/SHA256SUMS

  publish:
    name: Publish to GitHub Release
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated firmware release for $TAG"
          fi

          gh release upload "$TAG" \
            dist/firmware.zip \
            dist/SHA256SUMS \
            --clobber
