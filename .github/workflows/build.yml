name: Build

on:
  push:
    paths:
      - ".github/workflows/build.yml"
      - "build.yaml"
      - "config/**"
      - "Makefile"
  pull_request:
    paths:
      - ".github/workflows/build.yml"
      - "build.yaml"
      - "config/**"
      - "Makefile"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            .west
            modules
            optional
            zephyr
            zmk
            tools
            build
            .cache
          key: ${{ runner.os }}-zmk-build-${{ hashFiles('build.yaml', 'Makefile', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-zmk-build-

      - name: Build firmware
        run: make build

      - name: Fix workspace ownership for cache save
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            .west modules optional zephyr zmk tools build .cache artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: artifacts/*.uf2
